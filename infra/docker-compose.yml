services:
  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    working_dir: /app
    environment:
      PYTHONPATH: /app        # ensures `import app.*` works
    volumes:
      - ../backend:/app       # host backend -> container /app (contains /app/app/…)
    # Use your real env file; ensure it exists. Or comment this out.
    env_file:
      - ../backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - chroma
    # restart: unless-stopped   # optional

  ui:
    build:
      context: ..
      dockerfile: ui/Dockerfile
    working_dir: /app
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "1"   # helps file watching on Docker/Windows
    volumes:
      - ../ui:/app
      - ui_node_modules:/app/node_modules  # keep deps inside container
    command: >
      sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    depends_on:
      - api
    # restart: unless-stopped   # optional

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8001:8001"
    volumes:
      - chroma_data:/chroma/.chroma
    # restart: unless-stopped   # optional

volumes:
  chroma_data:
  ui_node_modules:
